<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="utf-8">
<title>Min Roblox-avatar</title>
<style>
  html,body{margin:0;height:100%;}
  body{
    display:flex;align-items:center;justify-content:center;
    background:radial-gradient(circle at 50% 30%, #cfe8ff 0%, #9ec9f2 60%, #6aa9e6 100%);
    font-family:'Comic Sans MS','Segoe UI',sans-serif;
  }
  .card{
    background:#ffffff;border-radius:28px;padding:24px 28px 18px;
    box-shadow:0 18px 50px rgba(0,0,0,.25);text-align:center;
  }
  h1{margin:0 0 6px;font-size:26px;color:#2b2b2b;letter-spacing:.5px;}
  .tag{margin:0 0 10px;font-size:14px;color:#5b6b7d;}
  svg{display:block;}
</style>
</head>
<body>
  <div class="card">
    <h1>Min Roblox-avatar 🇸🇪</h1>
    <p class="tag">version 1 – säg vad jag ska ändra!</p>
    <svg width="380" height="560" viewBox="0 0 380 560" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="hair" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#f6dd92"/>
          <stop offset="1" stop-color="#e0b257"/>
        </linearGradient>
        <linearGradient id="sweater" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#fbf6ea"/>
          <stop offset="1" stop-color="#ece2cd"/>
        </linearGradient>
        <linearGradient id="jeans" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#5b7ca8"/>
          <stop offset="1" stop-color="#3f5d84"/>
        </linearGradient>
        <radialGradient id="bg" cx="50%" cy="40%" r="70%">
          <stop offset="0" stop-color="#f3f8ff"/>
          <stop offset="1" stop-color="#e3eefb"/>
        </radialGradient>
      </defs>

      <rect x="0" y="0" width="380" height="560" rx="20" fill="url(#bg)"/>

      <!-- BACK HAIR (long, flows behind body) -->
      <path d="M120 95 C 88 120, 78 230, 96 360 C 104 410, 128 412, 132 360
               C 126 250, 138 150, 190 140 C 242 150, 254 250, 248 360
               C 252 412, 276 410, 284 360 C 302 230, 292 120, 260 95 Z"
            fill="url(#hair)" stroke="#cf9d44" stroke-width="3"/>

      <!-- LEGS -->
      <rect x="150" y="400" width="36" height="120" rx="10" fill="url(#jeans)" stroke="#33486a" stroke-width="3"/>
      <rect x="194" y="400" width="36" height="120" rx="10" fill="url(#jeans)" stroke="#33486a" stroke-width="3"/>
      <!-- shoes -->
      <rect x="146" y="512" width="42" height="26" rx="9" fill="#ffffff" stroke="#c9ccd2" stroke-width="3"/>
      <rect x="192" y="512" width="42" height="26" rx="9" fill="#ffffff" stroke="#c9ccd2" stroke-width="3"/>

      <!-- ARMS (sweater sleeves + skin hands) -->
      <rect x="92"  y="232" width="40" height="120" rx="12" fill="url(#sweater)" stroke="#d9cdb2" stroke-width="3"/>
      <rect x="248" y="232" width="40" height="120" rx="12" fill="url(#sweater)" stroke="#d9cdb2" stroke-width="3"/>
      <rect x="94"  y="338" width="36" height="34" rx="10" fill="#f6c9a2" stroke="#e2a87e" stroke-width="3"/>
      <rect x="250" y="338" width="36" height="34" rx="10" fill="#f6c9a2" stroke="#e2a87e" stroke-width="3"/>

      <!-- TORSO / SWEATER -->
      <rect x="128" y="228" width="124" height="160" rx="16" fill="url(#sweater)" stroke="#d9cdb2" stroke-width="3"/>
      <!-- cable-knit lines -->
      <g stroke="#e3d8bf" stroke-width="3" opacity=".8">
        <line x1="150" y1="240" x2="150" y2="378"/>
        <line x1="170" y1="240" x2="170" y2="378"/>
        <line x1="210" y1="240" x2="210" y2="378"/>
        <line x1="230" y1="240" x2="230" y2="378"/>
      </g>

      <!-- USA FLAG on chest -->
      <g>
        <rect x="156" y="270" width="68" height="46" rx="3" fill="#ffffff" stroke="#b9b9b9" stroke-width="1.5"/>
        <g fill="#b22234">
          <rect x="156" y="270" width="68" height="6.5"/>
          <rect x="156" y="283" width="68" height="6.5"/>
          <rect x="156" y="296" width="68" height="6.5"/>
          <rect x="156" y="309" width="68" height="6.5"/>
        </g>
        <rect x="156" y="270" width="30" height="24" fill="#3c3b6e"/>
        <g fill="#ffffff" font-size="6">
          <text x="160" y="278">★ ★ ★</text>
          <text x="160" y="288">★ ★ ★</text>
        </g>
      </g>

      <!-- HEAD -->
      <rect x="142" y="92" width="96" height="92" rx="20" fill="#f6c9a2" stroke="#e2a87e" stroke-width="3"/>
      <!-- cheeks -->
      <circle cx="160" cy="150" r="9" fill="#ffb0a0" opacity=".55"/>
      <circle cx="220" cy="150" r="9" fill="#ffb0a0" opacity=".55"/>
      <!-- eyes -->
      <ellipse cx="166" cy="132" rx="6.5" ry="9" fill="#2b2b2b"/>
      <ellipse cx="214" cy="132" rx="6.5" ry="9" fill="#2b2b2b"/>
      <circle cx="168" cy="129" r="2" fill="#fff"/>
      <circle cx="216" cy="129" r="2" fill="#fff"/>
      <!-- smile -->
      <path d="M168 156 Q 190 174, 212 156" fill="none" stroke="#2b2b2b" stroke-width="3.5" stroke-linecap="round"/>

      <!-- FRONT HAIR (fringe + part) -->
      <path d="M138 120 C 138 78, 242 78, 242 120
               C 244 104, 232 88, 190 86 C 148 88, 136 104, 138 120 Z"
            fill="url(#hair)" stroke="#cf9d44" stroke-width="3"/>
      <path d="M190 88 C 168 92, 150 104, 144 122 L 156 122 C 162 108, 176 98, 190 96 Z"
            fill="#f3d784" opacity=".7"/>
      <path d="M190 88 C 212 92, 230 104, 236 122 L 224 122 C 218 108, 204 98, 190 96 Z"
            fill="#f3d784" opacity=".7"/>
    </svg>
  </div>
</body>
</html>
